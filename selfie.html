<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>სელფის გადაღება</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    body {
      display: flex; flex-direction: column;
      background: var(--tg-theme-bg-color, #000); color: var(--tg-theme-text-color, #fff);
    }

    #cam-wrap { flex: 1; position: relative; min-height: 0; background: #000; overflow: hidden; }
    #cam, #shot {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1); /* mirror, front camera */
    }
    #shot { display: none; }

    #status {
      position: absolute; left: 0; right: 0; top: 12px; text-align: center;
      font-size: 13px; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      padding: 0 16px;
    }

    #footer { padding: 12px 14px 16px; flex-shrink: 0; background: var(--tg-theme-bg-color, #000); }
    #hint {
      font-size: 13px; color: var(--tg-theme-hint-color, #999);
      text-align: center; margin-bottom: 10px;
    }
    #btn-row { display: flex; gap: 8px; }
    button {
      flex: 1; padding: 13px; border: none; border-radius: 10px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    button:not(:disabled):active { opacity: 0.65; }
    #shoot-btn, #send-btn {
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
    }
    #retake-btn {
      background: var(--tg-theme-secondary-bg-color, #333);
      color: var(--tg-theme-text-color, #fff);
    }
  </style>
</head>
<body>
  <div id="cam-wrap">
    <video id="cam" autoplay playsinline muted></video>
    <img id="shot" alt="">
    <div id="status"></div>
  </div>

  <div id="footer">
    <div id="hint">🤳 მხოლოდ წინა კამერით — გალერეიდან ატვირთვა არ არის შესაძლებელი</div>
    <div id="btn-row">
      <button id="shoot-btn">📸 გადაღება</button>
    </div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // Upload endpoint on the evacuator-app droplet. Update if the host changes
    // (no custom domain yet — sslip.io resolves straight to the droplet IP so
    // Let's Encrypt can still issue a real certificate for it).
    const UPLOAD_URL = 'https://142-93-169-24.sslip.io/upload-selfie';

    const camWrap    = document.getElementById('cam-wrap');
    const video       = document.getElementById('cam');
    const shotImg     = document.getElementById('shot');
    const statusEl    = document.getElementById('status');
    const hintEl      = document.getElementById('hint');
    const btnRow      = document.getElementById('btn-row');

    let stream = null;
    let capturedDataUrl = null;

    function setStatus(text) { statusEl.textContent = text; }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user' }, // front camera only — no gallery/file picker anywhere
          audio: false,
        });
        video.srcObject = stream;
      } catch (err) {
        setStatus('❌ კამერაზე წვდომა ვერ მოხერხდა — დართეთ ნებართვა და თავიდან გახსენით გვერდი.');
      }
    }

    function stopCamera() {
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    }

    function showShootState() {
      video.style.display = 'block';
      shotImg.style.display = 'none';
      hintEl.textContent = '🤳 მხოლოდ წინა კამერით — გალერეიდან ატვირთვა არ არის შესაძლებელი';
      btnRow.innerHTML = '<button id="shoot-btn">📸 გადაღება</button>';
      document.getElementById('shoot-btn').addEventListener('click', takeShot);
      setStatus('');
    }

    function showPreviewState() {
      video.style.display = 'none';
      shotImg.style.display = 'block';
      hintEl.textContent = 'კარგად ჩანს სახე? თუ არა, გადაიღეთ თავიდან.';
      btnRow.innerHTML =
        '<button id="retake-btn">🔄 თავიდან</button><button id="send-btn">✅ გაგზავნა</button>';
      document.getElementById('retake-btn').addEventListener('click', retake);
      document.getElementById('send-btn').addEventListener('click', send);
    }

    function takeShot() {
      const canvas = document.createElement('canvas');
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      // The live <video> preview is mirrored via CSS (natural "look in a
      // mirror" framing), but the SAVED photo must not be — this is an
      // identity document, so it needs to be a true, non-reversed image of
      // the driver, not flipped left/right.
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      capturedDataUrl = canvas.toDataURL('image/jpeg', 0.9);
      // The preview thumbnail stays visually mirrored (CSS, like the live
      // video) so it still looks like "yourself in a mirror" when reviewing.
      showPreviewState();
    }

    function retake() {
      capturedDataUrl = null;
      showShootState();
    }

    async function send() {
      if (!capturedDataUrl) return;
      btnRow.innerHTML = '<button disabled>⏳ იგზავნება...</button>';
      setStatus('');
      try {
        const res = await fetch(UPLOAD_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ initData: tg.initData, imageBase64: capturedDataUrl }),
        });
        const data = await res.json().catch(() => null);
        if (!res.ok || !data || !data.ok) {
          hintEl.textContent = '❌ ვერ გაიგზავნა — სცადეთ ხელახლა.';
          btnRow.innerHTML =
            '<button id="retake-btn">🔄 თავიდან</button><button id="send-btn">✅ გაგზავნა</button>';
          document.getElementById('retake-btn').addEventListener('click', retake);
          document.getElementById('send-btn').addEventListener('click', send);
          return;
        }
        stopCamera();
        hintEl.textContent = '✅ მიღებულია! ეს გვერდი ახლა დაიხურება.';
        btnRow.innerHTML = '';
        setTimeout(() => tg.close(), 1200);
      } catch (err) {
        hintEl.textContent = '❌ ქსელის შეცდომა — სცადეთ ხელახლა.';
        btnRow.innerHTML =
          '<button id="retake-btn">🔄 თავიდან</button><button id="send-btn">✅ გაგზავნა</button>';
        document.getElementById('retake-btn').addEventListener('click', retake);
        document.getElementById('send-btn').addEventListener('click', send);
      }
    }

    document.getElementById('shoot-btn').addEventListener('click', takeShot);
    startCamera();
  </script>
</body>
</html>
